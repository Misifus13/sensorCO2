<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Incubadora Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Crear Cuenta</h2>
        
        <div class="input-group">
            <i class="fas fa-user field-icon"></i>
            <input id="usuario" placeholder="Nuevo Usuario">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock field-icon"></i>
            <div class="password-wrapper">
                <input id="contrasena" type="password" placeholder="Contraseña">
                <i class="fas fa-eye toggle-password" id="eyeIcon" onclick="togglePassword()"></i>
            </div>
        </div>
        
        <div class="input-group">
            <i class="fas fa-phone field-icon"></i>
            <input type="tel" id="celular" placeholder="Celular(Ej: +59177777777)">
        </div>
        
        <div class="input-group">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="email" placeholder="Correo electrónico (ejemplo@gmail.com)">
        </div>

        <div class="input-group">
            <i class="fas fa-microchip field-icon"></i>
            <input id="id_incubadora" placeholder="ID de la Incubadora (Ej: ENCUB_0001)">
        </div>
        

        <div class="btn-container">
            <button class="btn-login" id="btnRegistro" onclick="registrar()">Crear cuenta</button>
            <button class="btn-register" onclick="window.location='index.html'">Volver al Login</button>
        </div>
    </div>

    <script src="registro.js"></script>
</body>
</html>
