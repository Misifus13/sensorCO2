<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Incubadora Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Monitoreo</h2>
        
        <div class="input-group">
            <i class="fas fa-user field-icon"></i>
            <input id="usuario" placeholder="Usuario o Email">
        </div>

        <div class="input-group">
            <i class="fas fa-lock field-icon"></i>
            <div class="password-wrapper">
                <input id="contrasena" type="password" placeholder="Contraseña">
                <i class="fas fa-eye toggle-password" id="eyeIcon" onclick="togglePassword()"></i>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-login" id="btnLogin" onclick="login()">Ingresar</button>
            <button class="btn-register" onclick="window.location='registro.html'">Registrarse</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
