<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMonitor CO₂</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="dashboard-body">

<nav class="navbar">
    <span class="logo">🌱 EcoMonitor CO₂</span>
    <button class="btn-logout" onclick="logout()">Salir</button>
</nav>

<div class="dashboard-container">

    <div class="main-grid">

        <!-- CO2 -->
        <div class="panel-card">
            <div class="panel-header"><h3>🌿 Calidad del Aire</h3></div>

            <h1 id="currentCO2">-- ppm</h1>

            <div style="text-align:center; margin-top:10px;">
                <span id="estadoAire" style="font-size:1.3rem; font-weight:bold;">---</span>
            </div>
        </div>

        <!-- INFO -->
        <div class="panel-card">
            <div class="panel-header"><h3>📊 Información</h3></div>

            <p>Sensor: <b id="sensorID">---</b></p>
            <p>Última lectura: <b id="ultimaLectura">---</b></p>
        </div>

        <!-- CONTROL NUEVO -->
        <div class="panel-card">
            <div class="panel-header"><h3>⚙️ Control del Sistema</h3></div>

            <div class="control-buttons">
                <button class="btn-inicio" onclick="enviarEstado('INICIO')">
                    <i class="fas fa-play"></i> INICIO
                </button>

                <button class="btn-paro" onclick="enviarEstado('STOP')">
                    <i class="fas fa-stop"></i> PARO
                </button>
            </div>
        </div>

        <!-- HISTORIAL -->
        <div class="panel-card">
            <div class="panel-header"><h3>📜 Último comando</h3></div>
            <div id="historialEnvios">Sin comandos aún</div>
        </div>

    </div>

    <!-- GRAFICA -->
    <div class="chart-container">
        <div style="margin-bottom:10px;">Historial CO₂ (50 últimas lecturas)</div>
        <canvas id="grafica"></canvas>
    </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
