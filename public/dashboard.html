<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - EcoMonitor CO₂</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<nav class="navbar">
    <span class="logo">🌱 EcoMonitor CO₂</span>
    <button class="btn-logout" onclick="logout()">Salir</button>
</nav>

<div class="dashboard-container">
    <div class="main-grid">
        <div class="panel-card">
            <div class="panel-header"><h3>🌿 Calidad del Aire</h3></div>
            <div class="reading-item">
                <div>
                    <p>Concentración CO₂</p>
                    <h1 id="currentCO2">-- ppm</h1>
                </div>
            </div>
            <div style="text-align:center; margin-top:20px;">
                <span id="estadoAire" style="font-size:1.4rem; font-weight:bold;">---</span>
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-header"><h3>📊 Información</h3></div>
            <div class="setting-item">
                <span>Sensor:</span> <b id="sensorID">---</b>
            </div>
            <div class="setting-item">
                <span>Última actualización:</span> <b id="ultimaLectura">---</b>
            </div>
        </div>


        <div class="panel-card">
            <div class="panel-header"><h3>⚙️ Control MQTT</h3></div>
        
            <div style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
                <p><b>Comando Directo:</b></p>
                <input type="text" id="inputComando" placeholder="Ej: AVANZA 20" style="width:100%; padding:8px; margin-top:5px; border-radius:4px; border:1px solid #ddd;">
                <button onclick="enviarComando()" style="width:100%; margin-top:5px; background:#3b82f6; color:white; border:none; padding:8px; cursor:pointer; border-radius:4px;">
                    <i class="fas fa-paper-plane"></i> Enviar Directo
                </button>
            </div>
        
            <div>
                <p><b>Configurar Secuencia:</b></p>
                <div style="display:flex; gap:5px; align-items: center; margin-bottom:10px;">
                    <select id="selectAccion" style="flex: 2; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
                        <option value="AVANZA">AVANZA</option>
                        <option value="RETROCEDE">RETROCEDE</option>
                        <option value="GIRA">GIRA</option>
                    </select>
                    
                    <input type="number" id="inputValor" placeholder="Cant." class="no-spinners"
                           style="flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #ddd; text-align: center;">
                    
                    <button onclick="agregarAlista()" style="padding: 10px 15px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
        
                <ul id="listaSecuencia" style="list-style: none; padding: 0; margin: 10px 0; background: #f9f9f9; border-radius: 4px; border: 1px solid #eee; min-height: 50px;"></ul>
                
                <button onclick="guardarYEnviar()" style="width:100%; background:#8b5cf6; color:white; border:none; padding:10px; cursor:pointer; border-radius:4px; font-weight:600;">
                    <i class="fas fa-save"></i> Guardar y Enviar Ruta
                </button>
            </div>
        </div>






        
    </div>

    <div class="chart-container">
        <div style="margin-bottom:15px; font-weight:600;">Historial CO₂ (Últimas 50 lecturas)</div>
        <div style="height:350px;">
            <canvas id="grafica"></canvas>
        </div>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
